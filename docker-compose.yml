version: '3.9'

services:
  # Python backend
  pybackend:
    build:
      context: .
      dockerfile: docker/pybackend.Dockerfile
      args:
        - COMMIT_SHA=${COMMIT_SHA:-unknown}
        - BUILD_DATE=${BUILD_DATE:-unknown}
    environment:
      MADE_BACKEND_PORT: 3000
    volumes:
      - made-data:/app/.made
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - pybackend
    ports:
      - "8080:80"

volumes:
  made-data:
