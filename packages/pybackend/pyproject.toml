[project]
name = "made-pybackend"
version = "0.1.0"
description = "FastAPI backend for MADE"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115.0",
  "python-frontmatter==1.0.0",
  "python-multipart>=0.0.9",
  "uvicorn[standard]>=0.30.0",
  "ruff>=0.1.0",
  "pytest>=7.0.0",
  "pytest-cov>=4.0.0",
  "httpx>=0.27.0",
  "PyYAML>=6.0.2",
  "apscheduler>=3.11.2",
  "jinja2>=3.1.6",
  "urllib3>=2.6.3",
  "requests>=2.32.4",
  "cryptography>=46.0.7",
  "idna>=3.7",
  "certifi>=2024.7.4",
  "pyjwt>=2.12.0",
  "pyopenssl>=26.0.0",
  "pyasn1>=0.6.3",
  "pygments>=2.20.0",
]

[project.scripts]
made-backend = "app:main"

[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
exclude = [
  "/.venv",
  "/__pycache__",
  "*.pyc",
  "/tests",
  "/README.md",
  "/pyproject.toml",
  "/uv.lock"
]

[tool.uv]
package = true
