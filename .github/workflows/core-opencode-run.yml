---
name: Core - Reusable OpenCode Run

'on':
  workflow_call:
    inputs:
      run-name:
        description: >
          Name of the run (e.g. security, safety, performance)
        required: true
        type: string
      prompt:
        description: >
          Prompt content for the run (mutually exclusive with prompt-file)
        required: false
        type: string
      prompt-file:
        description: >
          Path to the prompt file (e.g. .github/prompts/security.prompt.md)
          (mutually exclusive with prompt)
        required: false
        type: string
      timeout-minutes:
        description: Timeout for the run job in minutes
        required: false
        type: number
        default: 120
      model:
        description: OpenCode model to use for the run
        required: false
        type: string
        default: 'opencode/big-pickle'
      agent:
        description: Agent to use for OpenCode run
        required: false
        type: string
        default: 'build'
      command:
        description: >
          Command to use for OpenCode run (alternative to prompt/prompt-file)
        required: false
        type: string
      branch:
        description: Branch name to check out and operate on
        required: false
        type: string
        default: ''
      runner:
        description: Runner to use for the job
        required: false
        type: string
        default: 'ubuntu-latest'
      post-run-nudge-prompt:
        description: >
          Optional prompt sent to OpenCode via continue mode (opencode run
          --continue) immediately after the main run completes successfully.
          Use as a hint for the agent to verify its own output, e.g.
          "check whether you posted the required issue comment".
          Skipped when empty.
        required: false
        type: string
        default: ''
      post-run-bash-command:
        description: >
          Optional bash command executed after the nudge step. Fails the job
          if it exits non-zero. Use as a deterministic gate, e.g. assert that
          a required issue-comment tag exists via gh api. GH_TOKEN is provided.
          Skipped when empty.
        required: false
        type: string
        default: ''
    outputs:
      results:
        description: >
          OpenCode output results (truncated if too large)
        value: ${{ jobs.run.outputs.results }}
      results-truncated:
        description: Whether the results were truncated due to size
        value: ${{ jobs.run.outputs.results-truncated }}
      artifact-name:
        description: Name of the uploaded artifact containing full results
        value: ${{ jobs.run.outputs.artifact-name }}

env:
  OPENCODE_INSTALL_URL: 'https://opencode.ai/install'
  MAX_OUTPUT_LINES: 50

jobs:
  run:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    outputs:
      results: ${{ steps.process-results.outputs.results }}
      results-truncated: ${{ steps.process-results.outputs.results-truncated }}
      artifact-name: ${{ steps.process-results.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: false
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "GHAR Agent"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Cache OpenCode binary
        id: cache-opencode
        uses: actions/cache@v4
        with:
          path: ~/.opencode/bin
          key: opencode-${{ runner.os }}-${{ runner.arch }}

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Install OpenCode
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: |
          echo "System information:"
          echo "OS: $(uname -s)"
          echo "Arch: $(uname -m)"
          echo "Install URL: ${{ env.OPENCODE_INSTALL_URL }}"

          if ! curl -fsSL "${{ env.OPENCODE_INSTALL_URL }}" | bash; then
            echo "WARNING: Latest OpenCode installation failed (GitHub API unreachable?)."
            echo "Falling back to pinned version 1.17.9."
            if ! curl -fsSL "${{ env.OPENCODE_INSTALL_URL }}" | bash -s -- --version 1.17.9; then
              echo "ERROR: Pinned fallback installation also failed"
              exit 1
            fi
          fi

          echo "OpenCode installation completed"

          if ! env -i \
            PATH="$HOME/.opencode/bin:$PATH" \
            HOME="$HOME" \
            opencode --version; then
            echo "ERROR: OpenCode installation verification failed"
            echo "Checking installation directory:"
            ls -la "$HOME/.opencode/bin/" || echo "Installation directory not found"
            exit 1
          fi

      - name: Run OpenCode ${{ inputs.run-name }}
        env:
          # Built-in token only — PAT must never enter the model context.
          OPENCODE_GH_TOKEN: ${{ github.token }}
          OPENCODE_GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          OPENCODE_GITHUB_SERVER_URL: ${{ github.server_url }}
          OPENCODE_GITHUB_API_URL: ${{ github.api_url }}
          OPENCODE_GITHUB_GRAPHQL_URL: ${{ github.graphql_url }}
          OPENCODE_GH_REPO: ${{ github.repository }}
          BRANCH: ${{ inputs.branch }}
        run: |
          RESULTS_FILE="${{ inputs.run-name }}-results.txt"

          opencode_run() {
            env -i \
              PATH="$HOME/.opencode/bin:$PATH" \
              HOME="$HOME" \
              BRANCH="$BRANCH" \
              GH_TOKEN="$OPENCODE_GH_TOKEN" \
              GITHUB_REPOSITORY="$OPENCODE_GITHUB_REPOSITORY" \
              GITHUB_REPOSITORY_OWNER="$OPENCODE_GITHUB_REPOSITORY_OWNER" \
              GITHUB_SERVER_URL="$OPENCODE_GITHUB_SERVER_URL" \
              GITHUB_API_URL="$OPENCODE_GITHUB_API_URL" \
              GITHUB_GRAPHQL_URL="$OPENCODE_GITHUB_GRAPHQL_URL" \
              GH_REPO="$OPENCODE_GH_REPO" \
              opencode run "$@"
          }

          if [ -n "${{ inputs.command }}" ]; then
            if [ -n "${{ inputs.prompt }}" ]; then
              echo "${{ inputs.prompt }}" | opencode_run \
                --command "${{ inputs.command }}" \
                --model "${{ inputs.model }}" \
                --agent "${{ inputs.agent }}" \
                > "$RESULTS_FILE"
            elif [ -n "${{ inputs.prompt-file }}" ]; then
              PROMPT=$(cat "${{ inputs.prompt-file }}")
              echo "$PROMPT" | opencode_run \
                --command "${{ inputs.command }}" \
                --model "${{ inputs.model }}" \
                --agent "${{ inputs.agent }}" \
                > "$RESULTS_FILE"
            else
              opencode_run \
                --command "${{ inputs.command }}" \
                --model "${{ inputs.model }}" \
                --agent "${{ inputs.agent }}" \
                > "$RESULTS_FILE"
            fi
          elif [ -n "${{ inputs.prompt }}" ]; then
            echo "${{ inputs.prompt }}" | opencode_run \
              --model "${{ inputs.model }}" \
              --agent "${{ inputs.agent }}" \
              > "$RESULTS_FILE"
          elif [ -n "${{ inputs.prompt-file }}" ]; then
            PROMPT=$(cat "${{ inputs.prompt-file }}")
            echo "$PROMPT" | opencode_run \
              --model "${{ inputs.model }}" \
              --agent "${{ inputs.agent }}" \
              > "$RESULTS_FILE"
          else
            echo "Error: At least one of 'command', 'prompt', or 'prompt-file' must be provided" >&2
            exit 1
          fi

      - name: Post-run nudge (continue session)
        if: ${{ success() && inputs.post-run-nudge-prompt != '' }}
        env:
          OPENCODE_GH_TOKEN: ${{ github.token }}
          OPENCODE_GITHUB_REPOSITORY: ${{ github.repository }}
          OPENCODE_GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          OPENCODE_GITHUB_SERVER_URL: ${{ github.server_url }}
          OPENCODE_GITHUB_API_URL: ${{ github.api_url }}
          OPENCODE_GITHUB_GRAPHQL_URL: ${{ github.graphql_url }}
          OPENCODE_GH_REPO: ${{ github.repository }}
          BRANCH: ${{ inputs.branch }}
          NUDGE_PROMPT: ${{ inputs.post-run-nudge-prompt }}
        run: |
          RESULTS_FILE="${{ inputs.run-name }}-results.txt"
          printf '\n---\n## Post-run nudge\n\n' >> "$RESULTS_FILE"
          printf '%s' "$NUDGE_PROMPT" | env -i \
            PATH="$HOME/.opencode/bin:$PATH" \
            HOME="$HOME" \
            BRANCH="$BRANCH" \
            GH_TOKEN="$OPENCODE_GH_TOKEN" \
            GITHUB_REPOSITORY="$OPENCODE_GITHUB_REPOSITORY" \
            GITHUB_REPOSITORY_OWNER="$OPENCODE_GITHUB_REPOSITORY_OWNER" \
            GITHUB_SERVER_URL="$OPENCODE_GITHUB_SERVER_URL" \
            GITHUB_API_URL="$OPENCODE_GITHUB_API_URL" \
            GITHUB_GRAPHQL_URL="$OPENCODE_GITHUB_GRAPHQL_URL" \
            GH_REPO="$OPENCODE_GH_REPO" \
            opencode run \
              --continue \
              --model "${{ inputs.model }}" \
              --agent "${{ inputs.agent }}" \
              >> "$RESULTS_FILE"

      - name: Post-run bash verification
        if: ${{ success() && inputs.post-run-bash-command != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_CMD: ${{ inputs.post-run-bash-command }}
        run: |
          RESULTS_FILE="${{ inputs.run-name }}-results.txt"
          printf '\n---\n## Post-run bash verification\n\n' >> "$RESULTS_FILE"
          VERIFY_RC=0
          bash -euo pipefail -c "$VERIFY_CMD" >> "$RESULTS_FILE" 2>&1 || VERIFY_RC=$?
          if [ "$VERIFY_RC" -ne 0 ]; then
            printf 'Post-run bash verification failed (exit code %s)\n' "$VERIFY_RC" >> "$RESULTS_FILE"
            exit "$VERIFY_RC"
          fi

      - name: Process results for output
        id: process-results
        if: always()
        run: |
          RESULTS_FILE="${{ inputs.run-name }}-results.txt"
          ARTIFACT_NAME="${{ inputs.run-name }}-results"

          # Check if results file exists
          if [ -f "$RESULTS_FILE" ]; then
            # Get file size in bytes
            FILE_SIZE=$(wc -c < "$RESULTS_FILE")
            MAX_SIZE=65000  # GitHub Actions output limit is ~65KB

            {
              echo "artifact-name=$ARTIFACT_NAME"
            } >> "$GITHUB_OUTPUT"

            if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
              # File is too large, truncate and indicate truncation
              echo "results-truncated=true" >> "$GITHUB_OUTPUT"

              # Create truncated version with summary
              {
                echo "results<<EOF"
                echo "# OpenCode Results (Truncated)"
                echo ""
                echo "⚠️ **Results were truncated due to size limits. Full results are available in the artifact.**"
                echo ""
                echo "**File size:** $FILE_SIZE bytes (limit: $MAX_SIZE bytes)"
                echo ""
                echo "---"
                echo ""
                head -c $((MAX_SIZE - 1000)) "$RESULTS_FILE"
                echo ""
                echo ""
                echo "..."
                echo ""
                echo "**[Full results available in artifact: $ARTIFACT_NAME]**"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            else
              # File is small enough, use full content
              echo "results-truncated=false" >> "$GITHUB_OUTPUT"
              {
                echo "results<<EOF"
                cat "$RESULTS_FILE"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            # No results file found
            {
              echo "results-truncated=false"
              echo "results=❌ No results file generated"
              echo "artifact-name=$ARTIFACT_NAME"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Upload ${{ inputs.run-name }} Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ${{ inputs.run-name }}-results
          path: ${{ inputs.run-name }}-results.txt
