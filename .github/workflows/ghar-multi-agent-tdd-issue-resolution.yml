name: GHAR Multi-Agent TDD Issue Resolution

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to resolve"
        required: true
        type: string

concurrency:
  group: ghar-multi-agent-issue-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  setup-branch:
    name: "0. Setup Shared Branch"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}
    steps:
      - name: Validate issue number
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          case "$ISSUE_NUMBER" in
            ''|*[!0-9]*) echo "issue_number must contain digits only" >&2; exit 1 ;;
          esac
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --silent

      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or reuse shared branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}-implementation"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Reusing existing branch $BRANCH"
          else
            git push origin "HEAD:refs/heads/$BRANCH"
          fi
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

  planner-requirements:
    name: "1A. Planner: Requirements"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-requirements
      command: ghar-planner-requirements
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-architecture:
    name: "1B. Planner: Architecture"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-architecture
      command: ghar-planner-architecture
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-risks:
    name: "1C. Planner: Risks"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-risks
      command: ghar-planner-risks
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-synthesizer:
    name: "2. Spec Synthesizer"
    needs: [planner-requirements, planner-architecture, planner-risks]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-synthesizer
      command: ghar-spec-synthesizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-redteam:
    name: "3. Spec Red Team"
    needs: spec-synthesizer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-redteam
      command: ghar-spec-redteam
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  tdd-reviewer:
    name: "4. TDD Reviewer"
    needs: spec-redteam
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: tdd-reviewer
      command: ghar-tdd-reviewer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-finalizer:
    name: "5. Spec Finalizer"
    needs: [spec-redteam, tdd-reviewer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-finalizer
      command: ghar-spec-finalizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  test-agent:
    name: "6. Test Agent"
    needs: spec-finalizer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: test-agent
      command: ghar-test-agent
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  implementer:
    name: "7. Implementer"
    needs: test-agent
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementer
      command: ghar-implementer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  implementation-redteam:
    name: "8. Implementation Red Team"
    needs: implementer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementation-redteam
      command: ghar-implementation-redteam
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  reviewer:
    name: "9A. Reviewer"
    needs: implementation-redteam
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: reviewer
      command: ghar-reviewer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  redteam:
    name: "9B. Red Team"
    needs: implementation-redteam
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: redteam
      command: ghar-redteam
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  frontier-gap-review:
    name: "9C. Frontier Gap Review"
    needs: [reviewer, redteam]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: frontier-gap-review
      command: ghar-frontier-gap-review
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  ci-agent:
    name: "10. CI Evidence Agent"
    needs: [reviewer, redteam]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: ci-agent
      command: ghar-ci-agent
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions: {actions: read, checks: read, contents: read, issues: read, pull-requests: read}
    secrets: inherit

  failure-classifier:
    name: "11. Failure Classifier"
    needs: ci-agent
    if: ${{ always() && needs.ci-agent.result != 'cancelled' }}
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: failure-classifier
      command: ghar-failure-classifier
      prompt: |
        Issue number: ${{ inputs.issue_number }}
        CI agent job result: ${{ needs.ci-agent.result }}
        CI agent report:
        ${{ needs.ci-agent.outputs.results }}
      timeout-minutes: 30
    permissions: {actions: read, checks: read, contents: read, issues: write, pull-requests: write}
    secrets: inherit

  fixer-integrator:
    name: "12. Fixer / Integrator"
    needs: failure-classifier
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: fixer-integrator
      command: ghar-fixer-integrator
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions: {actions: read, checks: read, contents: write, issues: write, pull-requests: write}
    secrets: inherit

  post-fix-ci-gate:
    name: "13. Post-Fix CI Gate"
    needs: fixer-integrator
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: read
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE_NUMBER: ${{ inputs.issue_number }}
    steps:
      - name: Wait for the latest branch checks to settle
        run: |
          set -euo pipefail
          BRANCH="agent/issue-${ISSUE_NUMBER}-implementation"
          SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/${BRANCH}" --jq '.object.sha')"
          echo "Watching ${BRANCH} at ${SHA}"

          attempt=0
          while [ "$attempt" -lt 60 ]; do
            attempt=$((attempt + 1))

            check_runs="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs?per_page=100")"
            status_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/status")"

            failed_runs="$(printf '%s' "$check_runs" | jq '[.check_runs[] | select(.status == "completed" and .conclusion != "success")] | length')"
            pending_runs="$(printf '%s' "$check_runs" | jq '[.check_runs[] | select(.status != "completed")] | length')"
            status_state="$(printf '%s' "$status_json" | jq -r '.state')"

            if [ "$failed_runs" -gt 0 ]; then
              echo "Latest CI checks failed for ${SHA}" >&2
              printf '%s' "$check_runs" | jq -r '.check_runs[] | select(.status == "completed" and .conclusion != "success") | "- \(.name): \(.conclusion)\n  \(.details_url // "")"' >&2
              exit 1
            fi

            if [ "$pending_runs" -eq 0 ] && [ "$status_state" != "pending" ]; then
              terminal_statuses="$(printf '%s' "$status_json" | jq '[.statuses[]? | select(.state != "success")] | length')"

              if [ "$terminal_statuses" -gt 0 ]; then
                echo "Latest CI checks failed for ${SHA}" >&2
                printf '%s' "$status_json" | jq -r '.statuses[]? | select(.state != "success") | "- \(.context): \(.state)\n  \(.target_url // "")"' >&2
                exit 1
              fi

              echo "Latest CI checks have settled for ${SHA}"
              exit 0
            fi

            sleep 30
          done

          echo "Latest CI checks did not reach a terminal state for ${SHA}" >&2
          printf '%s' "$check_runs" | jq -r '.check_runs[] | select(.status != "completed" or .conclusion != "success") | "- \(.name): \(.status) / \(.conclusion // "")\n  \(.details_url // "")"' >&2
          printf '%s' "$status_json" | jq -r '.statuses[]? | select(.state != "success") | "- \(.context): \(.state)\n  \(.target_url // "")"' >&2
          exit 1

  pr-finalizer:
    name: "14. PR Finalizer"
    needs: [fixer-integrator, post-fix-ci-gate, frontier-gap-review]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: pr-finalizer
      command: ghar-pr-finalizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {actions: read, checks: read, contents: read, issues: write, pull-requests: write}
    secrets: inherit
