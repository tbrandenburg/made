---
name: GHAR Multi-Agent TDD Issue Resolution

'on':
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to resolve"
        required: true
        type: string

concurrency:
  group: ghar-multi-agent-issue-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  setup-branch:
    name: "0. Setup Fresh Branch"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: Validate issue number
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          case "$ISSUE_NUMBER" in
            ''|*[!0-9]*)
              echo "issue_number must contain digits only" >&2
              exit 1
              ;;
          esac
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --silent

      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create fresh branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git switch --create "$BRANCH"
          git push --set-upstream origin "$BRANCH"

  planner-requirements:
    name: "1A. Planner: Requirements"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-requirements
      command: ghar-planner-requirements
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- plan-requirements -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- plan-requirements -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-architecture:
    name: "1B. Planner: Architecture"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-architecture
      command: ghar-planner-architecture
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- plan-architecture -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- plan-architecture -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-risks:
    name: "1C. Planner: Risks"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-risks
      command: ghar-planner-risks
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- plan-risks -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- plan-risks -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-research:
    name: "1D. Planner: Research"
    needs: [setup-branch, planner-requirements, planner-architecture, planner-risks]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-research
      command: ghar-planner-research
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- plan-research -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- plan-research -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-synthesizer:
    name: "2. Spec Synthesizer"
    needs:
      - planner-requirements
      - planner-architecture
      - planner-risks
      - planner-research
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-synthesizer
      command: ghar-spec-synthesizer
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- spec-final -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- spec-final -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-redteam:
    name: "3. Spec Red Team"
    needs: [setup-branch, spec-synthesizer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-redteam
      command: ghar-spec-redteam
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- spec-redteam -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- spec-redteam -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  timing-reviewer:
    name: "3B. Timing Reviewer"
    needs: [setup-branch, spec-redteam]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: timing-reviewer
      command: ghar-timing-review
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- timing-review-findings -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- timing-review-findings -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  tdd-reviewer:
    name: "4. TDD Reviewer"
    needs: [setup-branch, spec-redteam, timing-reviewer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: tdd-reviewer
      command: ghar-tdd-reviewer
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- spec-tdd-review -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- spec-tdd-review -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-finalizer:
    name: "5. Spec Finalizer"
    needs: [setup-branch, spec-redteam, timing-reviewer, tdd-reviewer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-finalizer
      command: ghar-spec-finalizer
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- spec-approved -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- spec-approved -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  test-agent:
    name: "6. Test Agent"
    needs: [setup-branch, spec-finalizer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: test-agent
      command: ghar-test-agent
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 45
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- tests-created -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- tests-created -->'
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  implementer:
    name: "7. Implementer"
    needs: [setup-branch, test-agent]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementer
      command: ghar-implementer
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 60
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- implementation-done -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- implementation-done -->'
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  pr-seeder:
    name: "7B. PR Seeder"
    needs: [setup-branch, implementer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: pr-seeder
      command: ghar-pr-seeder
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- pr-seeded -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- pr-seeded -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  create-pr:
    name: "7C. Create PR"
    needs: [setup-branch, pr-seeder]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Create PR
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          BRANCH: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          AUTH_TOKEN="${GH_PAT:-$GITHUB_TOKEN}"

          ISSUE_TITLE=$(GH_TOKEN="$AUTH_TOKEN" gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" \
            --jq '.title')
          PR_TITLE="fix(#${ISSUE_NUMBER}): ${ISSUE_TITLE}"

          PR_BODY="Resolves #${ISSUE_NUMBER}

          This pull request was created automatically by GHAR.
          The branch is still under active development and will be updated by later workflow stages."

          echo "Creating new PR from ${BRANCH}"
          GH_TOKEN="$AUTH_TOKEN" gh pr create \
            --head "$BRANCH" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"

  ci-retrigger-initial:
    name: "7D. CI Retrigger Initial"
    needs: [setup-branch, create-pr]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      pull-requests: write
    outputs:
      retrigger_action: ${{ steps.retrigger.outputs.retrigger_action }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: false
          fetch-depth: 0
          ref: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Retrigger CI
        id: retrigger
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          GHAR_WORKFLOW="GHAR Multi-Agent TDD Issue Resolution"
          if [ -z "$GH_PAT" ]; then
            echo "GH_PAT not configured, skipping"
            echo "retrigger_action=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA=$(git rev-parse HEAD)
          RUNS=$(GH_TOKEN="$GITHUB_TOKEN" gh api \
            "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$SHA" \
            --jq "[.workflow_runs[] | select(.name != \"$GHAR_WORKFLOW\")] | group_by(.workflow_id) | map(sort_by(.created_at) | last)" \
            2>/dev/null || echo '[]')
          ALL_GREEN=$(echo "$RUNS" | jq '(length > 0) and all(.status == "completed" and (.conclusion == "success" or .conclusion == "skipped" or .conclusion == "neutral"))' 2>/dev/null || echo 'false')
          if [ "$ALL_GREEN" = "true" ]; then
            echo "CI already green for $SHA"
            echo "retrigger_action=green" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_NUMBER=$(GH_TOKEN="$GH_PAT" gh pr list \
            --head "$BRANCH" --state open \
            --json number --jq '.[0].number // empty' 2>/dev/null)
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for branch $BRANCH"
            echo "retrigger_action=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Close/reopen PR #$PR_NUMBER to trigger CI..."
          GH_TOKEN="$GH_PAT" gh pr close "$PR_NUMBER" 2>/dev/null || true
          sleep 3
          if ! GH_TOKEN="$GH_PAT" gh pr reopen "$PR_NUMBER" 2>/dev/null; then
            echo "Failed to reopen PR #$PR_NUMBER"
            echo "retrigger_action=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "retrigger_action=triggered" >> "$GITHUB_OUTPUT"

  ci-wait-initial:
    name: "7E. CI Wait Initial"
    needs: [setup-branch, ci-retrigger-initial]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
    outputs:
      ci_status: ${{ steps.wait.outputs.ci_status }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
          persist-credentials: false
          fetch-depth: 0
          ref: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Wait for CI
        id: wait
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRANCH: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
          RETRIGGER_ACTION: ${{ needs.ci-retrigger-initial.outputs.retrigger_action }}
        run: |
          GHAR_WORKFLOW="GHAR Multi-Agent TDD Issue Resolution"
          APPEAR_TIMEOUT=120
          CI_POLL_TIMEOUT=1200
          if [ -z "$RETRIGGER_ACTION" ] \
              || [ "$RETRIGGER_ACTION" = "skipped" ] \
              || [ "$RETRIGGER_ACTION" = "green" ]; then
            echo "ci_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA=$(git rev-parse HEAD)
          if [ "$RETRIGGER_ACTION" = "triggered" ]; then
            echo "Waiting for CI runs to appear for $SHA..."
            APPEAR_DEADLINE=$(($(date +%s) + APPEAR_TIMEOUT))
            COUNT=0
            while [ "$(date +%s)" -lt "$APPEAR_DEADLINE" ]; do
              COUNT=$(GH_TOKEN="$GITHUB_TOKEN" gh api \
                "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$SHA" \
                --jq "[.workflow_runs[] | select(.name != \"$GHAR_WORKFLOW\")] | length" \
                2>/dev/null || echo '0')
              [ "${COUNT:-0}" -gt 0 ] && break
              sleep 15
            done
            if [ "${COUNT:-0}" -eq 0 ]; then
              echo "No CI runs appeared"
              echo "ci_status=no_ci" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "Polling CI completion for $SHA..."
          POLL_DEADLINE=$(($(date +%s) + CI_POLL_TIMEOUT))
          while [ "$(date +%s)" -lt "$POLL_DEADLINE" ]; do
            RUNS=$(GH_TOKEN="$GITHUB_TOKEN" gh api \
              "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$SHA" \
              --jq "[.workflow_runs[] | select(.name != \"$GHAR_WORKFLOW\")] | group_by(.workflow_id) | map(sort_by(.created_at) | last)" \
              2>/dev/null || echo '[]')
            TOTAL=$(echo "$RUNS" | jq 'length' 2>/dev/null || echo '0')
            COMPLETED=$(echo "$RUNS" | jq '[.[] | select(.status == "completed")] | length' 2>/dev/null || echo '0')
            FAILED=$(echo "$RUNS" | jq '[.[] | select(.status == "completed" and .conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length' 2>/dev/null || echo '0')
            echo "CI: $COMPLETED/$TOTAL completed, $FAILED failed"
            if [ "${TOTAL:-0}" -gt 0 ] && [ "${COMPLETED:-0}" -eq "${TOTAL:-0}" ]; then
              [ "${FAILED:-0}" -eq 0 ] && STATUS="green" || STATUS="failure"
              echo "ci_status=$STATUS" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 30
          done
          echo "CI polling timed out"
          echo "ci_status=no_ci" >> "$GITHUB_OUTPUT"

  implementation-review:
    name: "8A. Implementation Review"
    needs: [setup-branch, implementer, create-pr]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementation-review
      command: ghar-implementation-review
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 45
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- implementation-review-findings -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- implementation-review-findings -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  maintainer-review:
    name: "8B. Maintainer Review"
    needs: [setup-branch, implementer, create-pr]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: maintainer-review
      command: ghar-maintainer-review
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 30
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- maintainer-review-findings -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- maintainer-review-findings -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  adversarial-review:
    name: "8C. Adversarial Review"
    needs: [setup-branch, implementer, create-pr]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: adversarial-review
      command: ghar-adversarial-review
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 45
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- adversarial-review-findings -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- adversarial-review-findings -->'
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  residual-gap-review:
    name: "8D. Residual Gap Review"
    needs: [setup-branch, implementer, create-pr]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: residual-gap-review
      command: ghar-residual-gap-review
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 45
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- residual-gap-findings -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- residual-gap-findings -->'
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  e2e-evidence:
    name: "8E. E2E Evidence"
    needs: [setup-branch, implementer, ci-wait-initial]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: e2e-evidence
      command: ghar-e2e-evidence
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 60
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- e2e-evidence -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- e2e-evidence -->'
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
    secrets: inherit

  review-fixer:
    name: "9A. Review Fixer"
    needs:
      - setup-branch
      - implementation-review
      - maintainer-review
      - adversarial-review
      - residual-gap-review
      - e2e-evidence
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: review-fixer
      command: ghar-review-fixer
      prompt: ${{ inputs.issue_number }}
      branch: agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
      timeout-minutes: 60
      post-run-nudge-prompt: >
        Check the issue comments. If you have not yet posted the
        `<!-- fixer-summary -->` marker comment, do it now.
        Reply 'done' when complete.
      post-run-bash-command: |
        gh api --paginate "repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments" \
          --jq '.[].body' | grep -q '<!-- fixer-summary -->'
    permissions:
      contents: write
