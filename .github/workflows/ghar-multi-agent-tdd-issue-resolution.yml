---
name: GHAR Multi-Agent TDD Issue Resolution

'on':
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to resolve"
        required: true
        type: string

concurrency:
  group: ghar-multi-agent-issue-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  setup-branch:
    name: "0. Setup Shared Branch"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    outputs:
      branch_name: ${{ steps.branch.outputs.branch_name }}
    steps:
      - name: Validate issue number
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          case "$ISSUE_NUMBER" in
            ''|*[!0-9]*)
              echo "issue_number must contain digits only" >&2
              exit 1
              ;;
          esac
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --silent

      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create or reuse shared branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          BRANCH="agent/issue-${ISSUE_NUMBER}-implementation"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            echo "Reusing existing branch $BRANCH"
          else
            git push origin "HEAD:refs/heads/$BRANCH"
          fi
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

  planner-requirements:
    name: "1A. Planner: Requirements"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-requirements
      command: ghar-planner-requirements
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-architecture:
    name: "1B. Planner: Architecture"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-architecture
      command: ghar-planner-architecture
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-risks:
    name: "1C. Planner: Risks"
    needs: setup-branch
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-risks
      command: ghar-planner-risks
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  planner-research:
    name: "1D. Planner: Research"
    needs: [planner-requirements, planner-architecture, planner-risks]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: planner-research
      command: ghar-planner-research
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-synthesizer:
    name: "2. Spec Synthesizer"
    needs:
      - planner-requirements
      - planner-architecture
      - planner-risks
      - planner-research
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-synthesizer
      command: ghar-spec-synthesizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-redteam:
    name: "3. Spec Red Team"
    needs: spec-synthesizer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-redteam
      command: ghar-spec-redteam
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  tdd-reviewer:
    name: "4. TDD Reviewer"
    needs: spec-redteam
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: tdd-reviewer
      command: ghar-tdd-reviewer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  spec-finalizer:
    name: "5. Spec Finalizer"
    needs: [spec-redteam, tdd-reviewer]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: spec-finalizer
      command: ghar-spec-finalizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  test-agent:
    name: "6. Test Agent"
    needs: spec-finalizer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: test-agent
      command: ghar-test-agent
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  implementer:
    name: "7. Implementer"
    needs: test-agent
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementer
      command: ghar-implementer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  pr-seeder:
    name: "7B. PR Seeder"
    needs: implementer
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: pr-seeder
      command: ghar-pr-seeder
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  implementation-review:
    name: "8A. Implementation Review"
    needs: [implementer, pr-seeder]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: implementation-review
      command: ghar-implementation-review
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  maintainer-review:
    name: "8B. Maintainer Review"
    needs: [implementer, pr-seeder]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: maintainer-review
      command: ghar-maintainer-review
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  adversarial-review:
    name: "8C. Adversarial Review"
    needs: [implementer, pr-seeder]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: adversarial-review
      command: ghar-adversarial-review
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: write, issues: write, pull-requests: write}
    secrets: inherit

  residual-gap-review:
    name: "8D. Residual Gap Review"
    needs: [implementer, pr-seeder]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: residual-gap-review
      command: ghar-residual-gap-review
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 45
    permissions: {contents: read, issues: write, pull-requests: write}
    secrets: inherit

  e2e-evidence:
    name: "8E. E2E Evidence"
    needs: [implementer, pr-seeder]
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: e2e-evidence
      command: ghar-e2e-evidence
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: read
    secrets: inherit

  fixer-integrator:
    name: "9. Fixer / Integrator"
    needs:
      - implementation-review
      - maintainer-review
      - adversarial-review
      - residual-gap-review
      - e2e-evidence
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: fixer-integrator
      command: ghar-fixer-integrator
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 60
    permissions:
      actions: read
      checks: read
      contents: write
      issues: write
      pull-requests: write
    secrets: inherit

  pr-finalizer:
    name: "10. PR Finalizer"
    needs: fixer-integrator
    uses: ./.github/workflows/core-opencode-run.yml
    with:
      run-name: pr-finalizer
      command: ghar-pr-finalizer
      prompt: ${{ inputs.issue_number }}
      timeout-minutes: 30
    permissions:
      actions: read
      checks: read
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit
