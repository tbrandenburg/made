---
name: Issues - List Available Commands and Agents on New Issue

'on':
  issues:
    types: [opened]

jobs:
  list-tools:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: List available commands and agents
        id: list-tools
        run: |
          mapfile -t commands < <(
            find .opencode/commands -name '*.md' -type f -exec basename {} .md \; | sort
          )
          mapfile -t agents < <(
            find .opencode/agents -name '*.md' -type f -exec basename {} .md \; | sort
          )

          formatted_commands=()
          for cmd in "${commands[@]}"; do
            formatted_commands+=("/$cmd")
          done

          formatted_agents=()
          for agent in "${agents[@]}"; do
            formatted_agents+=("*$agent")
          done

          {
            echo "commands<<EOF"
            printf '%s\n' "${formatted_commands[@]}"
            echo "EOF"
            echo "agents<<EOF"
            printf '%s\n' "${formatted_agents[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        uses: actions/github-script@v9
        with:
          script: |
            const author = context.payload.issue.user.login;
            const commands = `${{ steps.list-tools.outputs.commands }}`;
            const agents = `${{ steps.list-tools.outputs.agents }}`;

            const commentBody = `Hello ${author}!

            Thanks for your feedback!

            Here are the tools I am offering:

            **Commands:**
            ${commands}

            **Agents:**
            ${agents}

            **Usage:**
            - Use commands directly: \`/command-name\`
            - Use agents with commands: \`*agent-name /command-name PROMPT\`

            Example: \`*review /security-review Please check this code for vulnerabilities\``;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
